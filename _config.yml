    content:
      - layout: top-middle
        title: "Shrinkage Estimation of Covariance Matrices: Economic Loss Minimization with Reinforcement Learning"
        additional_links:
          - title: Poster (PDF)
            icon: fas fa-file-pdf
            url: https://v-buchkov.github.io/assets/poster.pdf
        sub_title: with Gianluca De Nard & Urban Ulrych
        caption: 2026 — In preparation for submission
        description: | # this will include new lines to allow paragraphs
          Learns a regime-dependent shrinkage intensity that directly minimizes an economic loss — out-of-sample portfolio risk — rather than a statistical surrogate, via VAR contextual bandits over RFF-encoded market states. The estimator is Bayes-optimal with respect to the observed features and reduces the regret (gap to the oracle) relative to policy learning: around one-third for linear shrinkage and 9–40% for non-linear shrinkage across asset universes.
      - layout: top-middle
        title: "Strategy-Agnostic Cost-Aware Position Smoothing via Contextual Bandits"
        sub_title: with Urban Ulrych
        caption: 2026 — In preparation for submission
        description: | # this will include new lines to allow paragraphs
          Learns the expected return vs turnover trade-off via FPCA-encoded reward contextual bandits, applied to a convex optimization layer for exogenous weights. Improves gross-to-turnover ratio by 30–80 bps.

