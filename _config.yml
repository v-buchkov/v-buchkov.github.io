about_content: | # this will include new lines to allow paragraphs
  MSc Quantitative Finance at ETH Zürich / UZH, researching ML/RL for high-dimensional portfolio construction as decision-making under low signal-to-noise — framing transaction costs, predictor uncertainty, and regime-dependent dynamics as the problem of recovering the implementable strategy from a theoretical one. Prior work and industry experience span economic-loss covariance estimation, cost-aware portfolio construction, statistical arbitrage, volatility forecasting, and deep hedging.

  ## Research Interests:
  - ML/RL for high-dimensional portfolio construction
  - Decision-making under low signal-to-noise
  - Economic-loss covariance estimation
  - Cost-aware portfolio construction
  - Statistical arbitrage
  - Volatility forecasting
  - Deep hedging

  ## Programming Skills:
  <mark>Python</mark> (PyTorch, JAX, Flax, polars, gymnasium, hf-transformers), <mark>MATLAB</mark>, <mark>Java</mark>, <mark>C++</mark>, <mark>R</mark>, <mark>Golang</mark>, <mark>SQL</mark>.

